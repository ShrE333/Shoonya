name: antigravity
description: A new Flutter project for Shoonya Bank Loan Management.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1
  go_router: ^13.2.0
  camera: ^0.10.5
  google_mlkit_face_detection: ^0.10.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  fl_chart: ^0.66.0
  flutter_chat_ui: ^1.6.10
  http: ^1.2.0
  http_parser: ^4.0.0
  speech_to_text: ^7.3.0
  image: ^4.1.7
  record: ^5.1.0
  audioplayers: ^6.6.0
  audio_session: ^0.1.21
  path_provider: ^2.1.2
  flutter_chat_types: ^3.6.2

dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
